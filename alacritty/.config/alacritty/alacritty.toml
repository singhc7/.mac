[window]
decorations = "Full"
opacity = 1.0
startup_mode = "Maximized"
blur = false
# Left Option sends Alt (for word-jumps, vim/tmux), right Option still types special chars.
option_as_alt = "OnlyLeft"

[window.padding]
x = 8
y = 8

[font]
size = 16

[font.normal]
family = "UbuntuSansMono Nerd Font"
style = "Regular"

[font.bold]
family = "UbuntuSansMono Nerd Font"
style = "Bold"

[font.italic]
family = "UbuntuSansMono Nerd Font"
style = "Italic"

[font.bold_italic]
family = "UbuntuSansMono Nerd Font"
style = "Bold Italic"

[colors.primary]
background = '#1a1b26'
foreground = '#a9b1d6'

[colors.cursor]
text = "#1d2021"
cursor = "#ebdbb2"

[colors.selection]
text = "#1d2021"
background = "#ebdbb2"

[colors.normal]
black = "#32344a"
blue = "#7aa2f7"
cyan = "#449dab"
green = "#9ece6a"
magenta = "#ad8ee6"
red = "#f7768e"
white = "#787c99"
yellow = "#e0af68"

[colors.bright]
black = "#444b6a"
blue = "#7da6ff"
cyan = "#0db9d7"
green = "#b9f27c"
magenta = "#bb9af7"
red = "#ff7a93"
white = "#acb0d0"
yellow = "#ff9e64"

[cursor]
style = { shape = "Beam", blinking = "Always" }
vi_mode_style = { shape = "Block", blinking = "Off" }

[keyboard]
bindings = [
  # Clipboard
  { key = "C", mods = "Command", action = "Copy" },
  { key = "V", mods = "Command", action = "Paste" },

  # Window / app
  { key = "N", mods = "Command", action = "CreateNewWindow" },
  { key = "Q", mods = "Command", action = "Quit" },
  { key = "H", mods = "Command", action = "Hide" },
  { key = "H", mods = "Command|Option", action = "HideOtherApplications" },
  { key = "M", mods = "Command", action = "Minimize" },
  { key = "F", mods = "Command|Control", action = "ToggleFullscreen" },

  # Font size
  { key = "Equals", mods = "Command", action = "IncreaseFontSize" },
  { key = "Plus", mods = "Command", action = "IncreaseFontSize" },
  { key = "Minus", mods = "Command", action = "DecreaseFontSize" },
  { key = "Key0", mods = "Command", action = "ResetFontSize" },

  # Search & vi mode
  { key = "F", mods = "Command", action = "SearchForward" },
  { key = "Space", mods = "Control|Shift", action = "ToggleViMode" },

  # Readline-style line nav via Cmd+Arrows (macOS convention)
  { key = "Left", mods = "Command", chars = "\u0001" },        # Ctrl-A: start of line
  { key = "Right", mods = "Command", chars = "\u0005" },       # Ctrl-E: end of line
  { key = "Back", mods = "Command", chars = "\u0015" },        # Ctrl-U: delete to start
  # Word nav via Option+Arrows
  { key = "Left", mods = "Alt", chars = "\u001bb" },           # Esc-b: word back
  { key = "Right", mods = "Alt", chars = "\u001bf" },          # Esc-f: word fwd
  { key = "Back", mods = "Alt", chars = "\u0017" },            # Ctrl-W: delete word back
]
