# Fonts
font_size        15
bold_font        auto
italic_font      auto
bold_italic_font auto

# Symbol / emoji fallback (Nerd Font symbols, then Apple emoji)
symbol_map U+e000-U+e00a,U+ea60-U+ebeb,U+e0a0-U+e0c8,U+e0ca,U+e0cc-U+e0d7,U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b5,U+e700-U+e7c5,U+ed00-U+efc1,U+f000-U+f2ff,U+f300-U+f372,U+f400-U+f533,U+f0001-U+f1af0 Symbols Nerd Font Mono

# ---nnn---
# Allow other programs (like nnn) to control Kitty
allow_remote_control yes

# Create a socket for nnn to communicate with Kitty
listen_on unix:/tmp/kitty

# Ensure the 'splits' layout is enabled so nnn can open side-by-side panes
enabled_layouts splits

# --- Tab bar ---
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template " {index}: {title} "
active_tab_font_style bold

# --- Scrollback ---
scrollback_lines 10000
scrollback_pager_history_size 100
scrollback_fill_enlarged_window yes

# --- URL handling ---
url_style curly
open_url_with default
detect_urls yes
show_hyperlink_targets yes

# --- Window ---
window_padding_width 4
confirm_os_window_close -1
hide_window_decorations titlebar-only

# --- macOS ---
# Make Option key behave as Alt (needed for Alt+C, Alt+F, etc.)
macos_option_as_alt yes

# BEGIN_KITTY_THEME
# Adwaita darker
include current-theme.conf
# END_KITTY_THEME
