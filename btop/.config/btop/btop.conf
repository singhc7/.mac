#? Config file for btop v.1.4.6

#* Name of a btop++/bpytop/bashtop formatted ".theme" file, "Default" and "TTY" for builtin themes.
#* Themes should be placed in "../share/btop/themes" relative to binary or "$HOME/.config/btop/themes"
color_theme = "catppuccin_mocha"

#* If the theme set background should be shown, set to False if you want terminal background transparency.
theme_background = false

#* Sets if 24-bit truecolor should be used, will convert 24-bit colors to 256 color (6x6x6 color cube) if false.
truecolor = true

#* Set to true to force tty mode regardless if a real tty has been detected or not.
#* Will force 16-color mode and TTY theme, set all graph symbols to "tty" and swap out other non tty friendly symbols.
force_tty = false

#* Define presets for the layout of the boxes. Preset 0 is always all boxes shown with default settings. Max 9 presets.
#* Format: "box_name:P:G,box_name:P:G" P=(0 or 1) for alternate positions, G=graph symbol to use for box.
#* Use whitespace " " as separator between different presets.
#* Example: "cpu:0:default,mem:0:tty,proc:1:default cpu:0:braille,proc:0:tty"
presets = "cpu:0:default,mem:0:default,net:0:default,proc:0:default cpu:0:default,mem:0:default,proc:0:default"

#* Set to True to enable "h,j,k,l,g,G" keys for directional control in lists.
#* Conflicting keys for h:"help" and k:"kill" is accessible while holding shift.
vim_keys = true

#* Rounded corners on boxes, is ignored if TTY mode is ON.
rounded_corners = true

#* Use terminal synchronized output sequences to reduce flickering on supported terminals.
terminal_sync = true

#* Default symbols to use for graph creation, "braille", "block" or "tty".
graph_symbol = "braille"

# Graph symbol to use for graphs in cpu box, "default", "braille", "block" or "tty".
graph_symbol_cpu = "default"
graph_symbol_gpu = "default"
graph_symbol_mem = "default"
graph_symbol_net = "default"
graph_symbol_proc = "default"

#* Manually set which boxes to show. Available values are "cpu mem net proc" and "gpu0" through "gpu5", separate values with whitespace.
shown_boxes = "cpu mem net proc"

#* Update time in milliseconds, recommended 2000 ms or above for better sample times for graphs.
update_ms = 1000

#* Processes sorting, "pid" "program" "arguments" "threads" "user" "memory" "cpu lazy" "cpu direct",
proc_sorting = "cpu lazy"
proc_reversed = false
proc_tree = true
proc_colors = true
proc_gradient = true
proc_per_core = true
proc_mem_bytes = true
proc_cpu_graphs = true
proc_info_smaps = false
proc_left = false
proc_filter_kernel = false
proc_aggregate = true
keep_dead_proc_usage = false

#* Sets the CPU stat shown in upper half of the CPU graph, "total" is always available.
cpu_graph_upper = "Auto"
cpu_graph_lower = "Auto"

#* If gpu info should be shown in the cpu box. Available values = "Auto", "On" and "Off".
show_gpu_info = "On"

#* Toggles if the lower CPU graph should be inverted.
cpu_invert_lower = false
cpu_single_graph = true
cpu_bottom = false
show_uptime = true
show_cpu_watts = true
check_temp = true
cpu_sensor = "Auto"
show_coretemp = true
cpu_core_map = ""
temp_scale = "celsius"
base_10_sizes = false
show_cpu_freq = true
freq_mode = "first"

#* Draw a clock at top of screen, formatting according to strftime, empty string to disable.
clock_format = "%H:%M:%S"
background_update = true
custom_cpu_name = "Ryzen 7 4800H"
disks_filter = ""
mem_graphs = true
mem_below_net = false
zfs_arc_cached = true
show_swap = true
swap_disk = true
show_disks = true
only_physical = true
use_fstab = true
zfs_hide_datasets = false
disk_free_priv = false
show_io_stat = true
io_mode = false
io_graph_combined = false
io_graph_speeds = ""
net_download = 100
net_upload = 100
net_auto = true
net_sync = true
net_iface = ""
base_10_bitrate = "Auto"
show_battery = true
selected_battery = "Auto"
show_battery_watts = true
log_level = "WARNING"
save_config_on_exit = true
nvml_measure_pcie_speeds = true
rsmi_measure_pcie_speeds = true
gpu_mirror_graph = true
shown_gpus = "nvidia amd"
custom_gpu_name0 = "Vega iGPU"
custom_gpu_name1 = "RX 5500M"
custom_gpu_name2 = ""
custom_gpu_name3 = ""
custom_gpu_name4 = ""
custom_gpu_name5 = ""
