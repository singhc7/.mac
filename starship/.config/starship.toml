# Starship Prompt Configuration
# Docs: https://starship.rs/config/

# Timeout for commands that starship executes
command_timeout = 500

# Newline between prompts
add_newline = true

# Prompt format (2-line: info on top, input on bottom)
format = """
$os$directory$git_branch$git_status$git_state$python$java$package$jobs$cmd_duration
$character"""

[os]
disabled = false
style = "bold white"

[os.symbols]
Macos = " "

[directory]
truncation_length = 4
truncate_to_repo = true
style = "bold blue"
read_only = " 󰌾"

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
format = '($all_status$ahead_behind )'
style = "bold red"
ahead = " "
behind = " "
diverged = " "
modified = " "
staged = " "
untracked = " "

[git_state]
style = "bold yellow"
rebase = "rebasing"
merge = "merging"
revert = "reverting"
cherry_pick = "cherry-picking"
bisect = "bisecting"

[git_metrics]
disabled = true

[jobs]
symbol = "󰜎 "
style = "bold cyan"
threshold = 1

[character]
success_symbol = "[](bold green)"
error_symbol = "[](bold red)"
vimcmd_symbol = "[](bold cyan)"

[cmd_duration]
min_time = 2000
format = "took [$duration](bold yellow) "

[python]
symbol = " "
style = "bold yellow"

[rust]
disabled = true

[nodejs]
disabled = true

[java]
symbol = " "
style = "bold red"

[c]
disabled = true

[lua]
disabled = true

[package]
symbol = "󰏗 "
disabled = true
